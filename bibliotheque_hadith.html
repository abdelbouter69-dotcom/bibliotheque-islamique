.content{max-width:900px;margin:0 auto;padding:1rem 1rem 3rem;}

.hero-fr{font-size:11px;color:rgba(255,255,255,0.65);direction:ltr;}
.agent-bar{background:#fff;border:1px solid #ddd;border-radius:12px;padding:.9rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.agt-ava{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.agt-info{flex:1;}
.agt-name{font-family:'Amiri',serif;font-size:14px;color:#2C1A0E;}
.agt-sub{font-size:11px;color:#888;direction:ltr;}

.levels-tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
.lvl-tab{padding:5px 14px;border-radius:20px;font-size:11px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;font-family:'Noto Naskh Arabic',serif;}
.lvl-tab.active{background:#185FA5;border-color:#185FA5;color:#fff;}
.level-info{background:#fff;border:1px solid #ddd;border-radius:12px;padding:.8rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:10px;}
.lv-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.lv-title-ar{font-family:'Amiri',serif;font-size:15px;}
.lv-title-fr{font-size:10px;color:#888;}
.lv-badge{margin-left:auto;font-size:10px;padding:3px 10px;border-radius:10px;}
.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;}
.book-card{background:#fff;border-radius:12px;border:1px solid #ddd;overflow:hidden;display:flex;flex-direction:column;}
.book-cover{height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;position:relative;}
.cover-n{position:absolute;top:5px;right:6px;font-size:9px;color:rgba(255,255,255,0.7);}
.cover-ar{font-family:'Amiri',serif;font-size:12px;color:#fff;text-align:center;line-height:1.7;}

.book-links{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:4px;}

.btn-agent{width:100%;padding:5px;border-radius:8px;font-size:10px;background:#0C447C;color:#fff;border:none;cursor:pointer;font-family:'Noto Naskh Arabic',serif;}
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;}
.modal-wrap.open{display:flex;}
@media(min-width:600px){.modal-wrap{align-items:center;}}
.modal{background:#fff;border-radius:12px 12px 0 0;width:100%;max-width:600px;max-height:88vh;display:flex;flex-direction:column;}
@media(min-width:600px){.modal{border-radius:12px;max-height:80vh;}}
.modal-head{display:flex;align-items:center;gap:10px;padding:.8rem 1rem;border-bottom:1px solid #eee;flex-shrink:0;}

.m-close{background:none;border:none;font-size:20px;cursor:pointer;color:#888;}
.chat-area{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:8px;max-width:92%;}
.msg.user{flex-direction:row-reverse;align-self:flex-end;}
.bubble{padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.8;font-family:'Amiri',serif;background:#f5f5f5;color:#2C1A0E;}
.msg.user .bubble{background:#0C447C;color:#fff;border-radius:12px 3px 12px 12px;}
.msg.agent .bubble{border-radius:3px 12px 12px 12px;}
.m-av-sm{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;}
.typing-dots{display:flex;gap:4px;align-items:center;padding:10px 13px;}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:#888;animation:blink 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.chat-foot{padding:.7rem .9rem;border-top:1px solid #eee;display:flex;gap:8px;flex-shrink:0;}
.chat-in{flex:1;border:1px solid #ddd;border-radius:20px;padding:8px 13px;font-size:13px;outline:none;font-family:'Amiri',serif;background:#f9f9f9;resize:none;max-height:70px;color:#2C1A0E;}
.chat-in:focus{border-color:#378ADD;}
.chat-send{width:36px;height:36px;border-radius:50%;background:#0C447C;color:#fff;border:none;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.chat-send:disabled{opacity:.35;}

     {num:1,labelAr:'الشُّرُوحُ الأَسَاسِيَّة',labelFr:'Fondation',badge:'Débutant',numBg:'#D85A30',badgeC:'#FAECE7',badgeTxt:'#712B13',
      books:[
        {n:1,ar:'شَرْحُ النَّوَوِي عَلَى مُسْلِم',auth:'الإمام النووي (ت.676هـ)',desc:'Commentaire classique de Sahîh Muslim.',bg:'linear-gradient(135deg,#D85A30,#993C1D)',yt:'https://www.youtube.com/results?search_query=شرح+النووي+على+مسلم',sh:'https://shamela.ws/search?q=شرح+النووي+على+مسلم'},
      ]},
     {num:2,labelAr:'شُرُوحُ مُتَقَدِّمَة',labelFr:'Intermédiaire',badge:'Intermédiaire',numBg:'#E09F3E',badgeC:'#FEF3DC',badgeTxt:'#854F0B',
      books:[
        {n:1,ar:'عُمْدَةُ الأَحْكَام + شُرُوحُهَا',auth:'ابن قدامة / شروح متعددة',desc:'Hadiths législatifs avec commentaires.',bg:'linear-gradient(135deg,#FAC775,#E09F3E)',yt:'https://www.youtube.com/results?search_query=شرح+عمدة+الأحكام',sh:'https://shamela.ws/search?q=شرح+عمدة+الأحكام'},
      ]},
     {num:3,labelAr:'التَّخَصُّص',labelFr:'Expert',badge:'Expert',numBg:'#3C3489',badgeC:'#EEEDFE',badgeTxt:'#26215C',
      books:[
        {n:1,ar:'فَتْحُ البَارِي',auth:'ابن حجر العسقلاني (ت.852هـ)',desc:'Le commentaire le plus complet du Sahîh Bukhâri.',bg:'linear-gradient(135deg,#7F77DD,#534AB7)',yt:'https://www.youtube.com/results?search_query=فتح+الباري+ابن+حجر',sh:'https://shamela.ws/search?q=فتح+الباري+ابن+حجر'},
      ]},
   ]},
];

let curAgent='hadith',curLevels={hadith:0,ulum:0,sira:0,sahaba:0,sharh:0};
let chatHistory=[],curAgentData=null,isLoading=false;

function getAgent(){return AGENTS.find(a=>a.id===curAgent);}
function renderTabs(){
  document.getElementById('agentTabs').innerHTML=AGENTS.map(a=>`
    <button class="agent-btn${a.id===curAgent?' active':''}" onclick="switchAgent('${a.id}')">
      ${a.icon} <span style="font-family:Amiri,serif;font-size:14px;">${a.labelAr}</span>
    </button>`).join('');
}
function renderContent(){
  const ag=getAgent(),lvIdx=curLevels[ag.id],lv=ag.levels[lvIdx];
  document.getElementById('mainContent').innerHTML=`
    <div class="agent-hero" style="background:${ag.heroBg}">
      <div class="hero-inner">
        <div class="hero-icon">${ag.icon}</div>
        <div><div class="hero-ar">${ag.labelAr} — وَكِيلٌ ذَكِيٌّ</div><div class="hero-fr">${ag.label}</div></div>
      </div>
    </div>
    <div class="agent-bar">
      <div class="agt-ava" style="background:${ag.avaBg}">${ag.ava}</div>
      <div class="agt-info"><div class="agt-name">وَكِيلُ ${ag.labelAr}</div><div class="agt-sub">${ag.label}</div></div>
      <button class="agt-btn" onclick="openChat('','عام')">اسْأَلِ الوَكِيل</button>
    </div>
    <div class="levels-tabs">${ag.levels.map((l,i)=>`<button class="lvl-tab${i===lvIdx?' active':''}" onclick="switchLevel(${i})">${l.num}. ${l.labelFr}</button>`).join('')}</div>
    <div class="level-info">
      <div class="lv-num" style="background:${lv.numBg}">${lv.num}</div>
      <div><div class="lv-title-ar">${lv.labelAr}</div><div class="lv-title-fr">${lv.labelFr}</div></div>
      <span class="lv-badge" style="background:${lv.badgeC};color:${lv.badgeTxt}">${lv.badge}</span>
    </div>
    <div class="books-grid">${lv.books.map(b=>`
      <div class="book-card">
        <div class="book-cover" style="background:${b.bg}">
          <span class="cover-n">${b.n}.</span>
          <div class="cover-ar">${b.ar}</div>
          <div class="cover-auth">${b.auth}</div>
        </div>
        <div class="book-body">
          <div class="book-desc">${b.desc}</div>
          <div class="book-links">
            <a class="btn-lnk" href="${b.yt}" target="_blank">▶ يوتيوب</a>
            <a class="btn-lnk" href="${b.sh}" target="_blank">📖 شاملة</a>
          </div>
          <button class="btn-agent" onclick="openChat('${b.ar.replace(/'/g,"\\'")}','${lv.badge}')">🤖 اسأل الوكيل ←</button>
        </div>
      </div>`).join('')}</div>`;
}
function switchAgent(id){curAgent=id;renderTabs();renderContent();}
function switchLevel(i){curLevels[curAgent]=i;renderContent();}
function openChat(bookAr,level){
  const ag=getAgent();curAgentData=ag;chatHistory=[];
  document.getElementById('mAva').textContent=ag.ava;
  document.getElementById('mAva').style.background=ag.avaBg;
  document.getElementById('mName').textContent='وَكِيلُ '+ag.labelAr;
  document.getElementById('mLevel').textContent=bookAr?'📖 '+bookAr:'استشارة عامة';
  document.getElementById('chatArea').innerHTML=`<div class="welcome">${ag.ava}<br>مرحباً — اسألني عن ${ag.labelAr}<br><small style="direction:ltr">Posez votre question en arabe ou en français</small></div>`;
  document.getElementById('modalWrap').classList.add('open');
  setTimeout(()=>document.getElementById('chatIn').focus(),100);
}
function closeModal(){document.getElementById('modalWrap').classList.remove('open');}
function appendMsg(role,text){
  const area=document.getElementById('chatArea');
  const w=area.querySelector('.welcome');if(w)w.remove();
  const div=document.createElement('div');div.className=`msg ${role}`;
  div.innerHTML=role==='agent'
    ?`<div class="m-av-sm" style="background:${curAgentData.avaBg}">${curAgentData.ava}</div><div class="bubble">${text.replace(/\n/g,'<br>')}</div>`
    :`<div class="bubble">${text}</div>`;
  area.appendChild(div);area.scrollTop=area.scrollHeight;
}
function showTyping(){
  const area=document.getElementById('chatArea');
  const d=document.createElement('div');d.className='msg agent';d.id='typEl';
  d.innerHTML=`<div class="m-av-sm" style="background:${curAgentData.avaBg}">${curAgentData.ava}</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  area.appendChild(d);area.scrollTop=area.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typEl');if(t)t.remove();}
async function callAgent(msg,level){
  if(isLoading)return;
  isLoading=true;document.getElementById('sendBtn').disabled=true;
  showTyping();chatHistory.push({role:'user',content:msg});
  try{
    const r=await fetch('/.netlify/functions/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system:curAgentData.system+'\n\nمستوى الطالب: '+(level||'عام'),
        messages:chatHistory})
    });
    const data=await r.json();
    if(!r.ok)throw new Error(data?.error||'HTTP '+r.status);
    const reply=data.text||'عفواً.';
    hideTyping();appendMsg('agent',reply);
    chatHistory.push({role:'assistant',content:reply});
  }catch(err){
    hideTyping();
    const d=document.createElement('div');
    d.style.cssText='background:#fff3cd;padding:8px;border-radius:8px;font-size:11px;direction:ltr;text-align:center;';
    d.innerHTML='⚠️ '+err.message;
    document.getElementById('chatArea').appendChild(d);
  }
  isLoading=false;document.getElementById('sendBtn').disabled=false;
}
function sendMsg(){
  const inp=document.getElementById('chatIn');const msg=inp.value.trim();if(!msg)return;
  inp.value='';inp.style.height='auto';appendMsg('user',msg);callAgent(msg,'عام');
}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
document.getElementById('chatIn').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,70)+'px';});
document.getElementById('modalWrap').addEventListener('click',function(e){if(e.target===this)closeModal();});
renderTabs();renderContent();
</script>
</body>
</html>
